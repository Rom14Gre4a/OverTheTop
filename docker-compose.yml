services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: overthethop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: OverTheTop.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=overthethop;Username=postgres;Password=postgres
      - Jwt__Key=change-me-to-a-secure-secret-key-min-32-chars
      - Jwt__Issuer=OverTheTop
      - Jwt__Audience=OverTheTopClient
      - Cors__AllowedOrigins=http://localhost:3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  postgres_data:
